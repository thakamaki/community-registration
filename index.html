<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
// ──────────────────────────────────────────────
// SECURE TOKEN MANAGEMENT (localStorage)
// ──────────────────────────────────────────────
let currentToken = localStorage.getItem('pulsara_api_token') || null;

function updateTokenStatus() {
  const el = document.getElementById('tokenStatus');
  if (currentToken) {
    el.textContent = '● Token Active (saved in browser)';
    el.className = 'auth-status in';
  } else {
    el.textContent = '● No token set';
    el.className = 'auth-status out';
  }
}

function saveToken() {
  const input = document.getElementById('tokenInput').value.trim();
  if (!input) {
    toast('Please paste a valid token', 'error');
    return;
  }
  currentToken = input;
  localStorage.setItem('pulsara_api_token', currentToken);
  document.getElementById('tokenInput').value = ''; // clear field
  updateTokenStatus();
  slog('✓ API token saved securely to browser storage');
  toast('Token saved and activated', 'success');
}

function clearToken() {
  if (!confirm('Clear the saved token? This will stop all submissions until a new token is added.')) return;
  currentToken = null;
  localStorage.removeItem('pulsara_api_token');
  updateTokenStatus();
  slog('Token cleared from browser');
  toast('Token cleared', '');
}

// Get token for API calls
function getAuthHeader() {
  if (!currentToken) {
    toast('No Pulsara token set. Go to Admin tab and paste your token.', 'error');
    return null;
  }
  return `Bearer ${currentToken}`;
}

// ──────────────────────────────────────────────
// UPDATE ALL FETCH CALLS to use getAuthHeader()
// ──────────────────────────────────────────────

  const auth = getAuthHeader();
  if (!auth) return;

  const r = await fetch(resolveApiBase('/api/v1/patient-channels'), {
    method: 'POST',
    headers: { 'Authorization': auth, 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  });
  // ... rest of function unchanged
}

// ──────────────────────────────────────────────
// QR Code now includes the token automatically
// ──────────────────────────────────────────────
function generateQR() {
  const inc = document.getElementById('adminIncident').value.trim();
  const cp  = document.getElementById('cpLabel').value.trim();
  const hid = parseInt(document.getElementById('adminHospitalId').value);

  if (!inc) { toast('Enter an Incident ID first', 'error'); return; }

  let base = window.location.href.split('?')[0];
  let url = base + '?incident=' + encodeURIComponent(inc);
  if (cp) url += '&cp=' + encodeURIComponent(cp);
  if (configured_hospital_id) url += '&hid=' + configured_hospital_id;

  // Automatically include token in QR if available
  if (currentToken) {
    url += '&t=' + encodeURIComponent(currentToken);
  }

  document.getElementById('qrUrl').textContent = url;
  document.getElementById('qrPanel').style.display = 'block';
  document.getElementById('qrCanvas').innerHTML = '';
  new QRCode("qrCanvas", url);
  slog(`QR generated with token included`);
}

// On page load - check if token was passed in URL (from QR)
window.addEventListener('load', () => {
  const params = new URLSearchParams(window.location.search);
  const urlToken = params.get('t');
  if (urlToken) {
    currentToken = urlToken;
    localStorage.setItem('pulsara_api_token', currentToken);
    slog('✓ Token loaded automatically from QR code');
  }

  updateTokenStatus();
  // ... rest of your load code
});

</script>
